name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Canary version
      description: Release version
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - 3DS
        - 3DS XL
        - 2DS
        - New 3DS
        - New 3DS XL
        - New 2DS XL
        - Emulator (Azahar)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / crash dump
      description: Paste any relevant logs, crash output, or attach files here
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
    validations:
      required: false
